<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — InsightHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-layout { display: grid; grid-template-columns: 220px 1fr; gap: 2rem; padding: 2rem 0; align-items: start; }
    @media(max-width:768px){ .admin-layout { grid-template-columns: 1fr; } }
    .sidebar-nav { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; position: sticky; top: 80px; }
    .sidebar-nav a {
      display: block; padding: 12px 16px; font-size: 0.875rem; color: var(--text2);
      border-bottom: 1px solid var(--border); transition: all 0.15s; text-decoration: none;
    }
    .sidebar-nav a:last-child { border-bottom: none; }
    .sidebar-nav a:hover { color: var(--text); background: var(--bg3); }
    .sidebar-nav a.active { color: var(--accent); background: var(--accent-dim); }
    .panel { display: none; }
    .panel.active { display: block; }
    .panel-title { font-size: 1.4rem; margin-bottom: 1.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .action-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .project-row-title { font-weight: 500; font-size: 0.9rem; color: var(--text); }
    .project-row-meta  { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .filter-tab.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="container">
    <div class="admin-layout">
      <div class="sidebar-nav">
        <a href="#" class="active" onclick="showPanel('overview', this)">📊 Overview</a>
        <a href="#" onclick="showPanel('pending', this)">⏳ Pending Review</a>
        <a href="#" onclick="showPanel('all', this)">📁 All Projects</a>
        <a href="#" onclick="showPanel('users', this)">👥 Users</a>
      </div>

      <div class="main-col">
        <!-- OVERVIEW PANEL -->
        <div class="panel active" id="panel-overview">
          <h2 class="panel-title">Platform Overview</h2>
          <div class="stats-grid" id="stats-grid">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- PENDING PANEL -->
        <div class="panel" id="panel-pending">
          <h2 class="panel-title">Pending Review</h2>
          <div id="pending-list"><div class="loading"><div class="spinner"></div></div></div>
        </div>

        <!-- ALL PROJECTS PANEL -->
        <div class="panel" id="panel-all">
          <h2 class="panel-title">All Projects</h2>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterProjects('', this)">All</button>
            <button class="filter-tab" onclick="filterProjects('approved', this)">Approved</button>
            <button class="filter-tab" onclick="filterProjects('pending', this)">Pending</button>
            <button class="filter-tab" onclick="filterProjects('rejected', this)">Rejected</button>
          </div>
          <div id="all-list"><div class="loading"><div class="spinner"></div></div></div>
        </div>

        <!-- USERS PANEL -->
        <div class="panel" id="panel-users">
          <h2 class="panel-title">Registered Users</h2>
          <div id="users-list"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:560px;margin:1rem;max-height:90vh;overflow-y:auto">
      <h3 style="margin-bottom:1.5rem">Edit Project</h3>
      <input type="hidden" id="edit-id"/>
      <div class="form-group"><label>Title</label><input type="text" id="edit-title"/></div>
      <div class="form-group"><label>Abstract</label><textarea id="edit-abstract" rows="4"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Department</label><input type="text" id="edit-dept"/></div>
        <div class="form-group"><label>Year</label><input type="number" id="edit-year"/></div>
      </div>
      <div class="form-group"><label>Tags</label><input type="text" id="edit-tags"/></div>
      <div class="form-group"><label>Technologies</label><input type="text" id="edit-tech"/></div>
      <div style="display:flex;gap:0.75rem;margin-top:1rem">
        <button class="btn btn-primary" onclick="saveEdit()">Save changes</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script>
    renderNav('admin');
    if (!requireAdmin()) { /* redirects */ }

    let currentAllFilter = '';

    function showPanel(name, el) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      el.classList.add('active');

      if (name === 'overview')  loadStats();
      if (name === 'pending')   loadProjects('pending', 'pending-list');
      if (name === 'all')       loadProjects(currentAllFilter, 'all-list');
      if (name === 'users')     loadUsers();
    }

    function filterProjects(status, btn) {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentAllFilter = status;
      loadProjects(status, 'all-list');
    }

    async function loadStats() {
      try {
        const s = await apiFetch('/admin/stats');
        document.getElementById('stats-grid').innerHTML = `
          ${statCard(s.total_users, 'Users')}
          ${statCard(s.total_projects, 'Total projects')}
          ${statCard(s.pending_projects, 'Pending', 'accent')}
          ${statCard(s.approved_projects, 'Approved', 'green')}
          ${statCard(s.rejected_projects, 'Rejected', 'red')}
          ${statCard(s.total_comments, 'Comments')}
          ${statCard(s.total_bookmarks, 'Bookmarks')}
        `;
      } catch(err) {
        document.getElementById('stats-grid').innerHTML = `<p style="color:var(--red)">${err.message}</p>`;
      }
    }

    function statCard(num, label, color) {
      const colorMap = { accent: 'var(--accent)', green: 'var(--green)', red: 'var(--red)' };
      const c = colorMap[color] || 'var(--accent)';
      return `
        <div class="stat-card">
          <div class="number" style="color:${c}">${num}</div>
          <div class="label">${label}</div>
        </div>`;
    }

    async function loadProjects(status, containerId) {
      const el = document.getElementById(containerId);
      el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      try {
        const qs = status ? `?status=${status}` : '';
        const projects = await apiFetch(`/admin/projects${qs}`);

        if (projects.length === 0) {
          el.innerHTML = '<div class="empty-state"><p>No projects found.</p></div>';
          return;
        }

        el.innerHTML = `
          <div class="card" style="padding:0;overflow:hidden">
            ${projects.map(p => `
              <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--border)">
                <div style="display:flex;justify-content:space-between;align-items:start;gap:1rem;flex-wrap:wrap">
                  <div>
                    <div class="project-row-title">${p.title}</div>
                    <div class="project-row-meta">
                      ${p.author_name} · ${p.department || 'No dept'} · ${p.year || ''} · ${timeAgo(p.created_at)}
                    </div>
                    <div style="margin-top:6px">
                      <span class="tag ${statusClass(p.status)}">${p.status}</span>
                    </div>
                  </div>
                  <div class="action-row">
                    ${p.status !== 'approved'  ? `<button class="btn btn-success btn-sm" onclick="setStatus(${p.id},'approved')">Approve</button>` : ''}
                    ${p.status !== 'rejected'  ? `<button class="btn btn-danger btn-sm" onclick="setStatus(${p.id},'rejected')">Reject</button>` : ''}
                    <button class="btn btn-outline btn-sm" onclick="openEdit(${p.id},'${escape(p.title)}','${escape(p.abstract)}','${escape(p.department||'')}','${p.year||''}','${escape(p.tags||'')}','${escape(p.technologies||'')}')">Edit</button>
                    <button class="btn btn-ghost btn-sm" onclick="deleteProject(${p.id})">Delete</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>`;
      } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function statusClass(s) {
      return s === 'approved' ? 'tag-green' : s === 'rejected' ? 'tag-red' : 'tag-accent';
    }

    async function setStatus(id, status) {
      try {
        await apiFetch(`/admin/projects/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
        showToast(`Project ${status}!`, 'success');
        loadProjects('pending', 'pending-list');
        loadProjects(currentAllFilter, 'all-list');
        loadStats();
      } catch(err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteProject(id) {
      if (!confirm('Are you sure you want to delete this project? This cannot be undone.')) return;
      try {
        await apiFetch(`/admin/projects/${id}`, { method: 'DELETE' });
        showToast('Project deleted.', 'success');
        loadProjects(currentAllFilter, 'all-list');
        loadProjects('pending', 'pending-list');
        loadStats();
      } catch(err) {
        showToast(err.message, 'error');
      }
    }

    function openEdit(id, title, abstract, dept, year, tags, tech) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-title').value = unescape(title);
      document.getElementById('edit-abstract').value = unescape(abstract);
      document.getElementById('edit-dept').value = unescape(dept);
      document.getElementById('edit-year').value = year;
      document.getElementById('edit-tags').value = unescape(tags);
      document.getElementById('edit-tech').value = unescape(tech);
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    async function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const payload = {
        title:        document.getElementById('edit-title').value.trim(),
        abstract:     document.getElementById('edit-abstract').value.trim(),
        department:   document.getElementById('edit-dept').value.trim(),
        year:         document.getElementById('edit-year').value,
        tags:         document.getElementById('edit-tags').value.trim(),
        technologies: document.getElementById('edit-tech').value.trim()
      };
      try {
        await apiFetch(`/admin/projects/${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
        showToast('Project updated!', 'success');
        closeModal();
        loadProjects(currentAllFilter, 'all-list');
        loadProjects('pending', 'pending-list');
      } catch(err) {
        showToast(err.message, 'error');
      }
    }

    async function loadUsers() {
      const el = document.getElementById('users-list');
      try {
        const users = await apiFetch('/admin/users');
        el.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr>
              </thead>
              <tbody>
                ${users.map(u => `
                  <tr>
                    <td>${u.name}</td>
                    <td style="color:var(--text2)">${u.email}</td>
                    <td><span class="tag ${u.role === 'admin' ? 'tag-accent' : ''}">${u.role}</span></td>
                    <td style="color:var(--text3)">${timeAgo(u.created_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`;
      } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    // Load overview on start
    loadStats();
  </script>
</body>
</html>
