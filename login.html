<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — InsightHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; flex-direction: column; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
    }
    .auth-card h2 { font-size: 1.8rem; margin-bottom: 0.4rem; }
    .auth-card p { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text2); }
    .auth-footer a { color: var(--accent); }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p>Sign in to your InsightHub account</p>

      <div id="error-msg" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center" id="login-btn" onclick="doLogin()">
        Sign in
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script>
    renderNav('');

    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('login-btn');

      errEl.classList.add('hidden');

      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        setAuth(data.token, data.user);
        showToast('Welcome back, ' + data.user.name.split(' ')[0] + '!', 'success');

        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? 'admin.html' : 'index.html';
        }, 600);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Sign in';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
