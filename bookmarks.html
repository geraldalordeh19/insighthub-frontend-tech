<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Projects — InsightHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #bookmarks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.25rem; }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="container">
    <div class="page-header">
      <h1>Saved Projects</h1>
      <p>Projects you've bookmarked for later</p>
    </div>
    <div id="bookmarks-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script>
    renderNav('bookmarks');
    if (!requireAuth()) { /* redirects */ }

    async function loadBookmarks() {
      const grid = document.getElementById('bookmarks-grid');
      try {
        const bookmarks = await apiFetch('/bookmarks');

        if (bookmarks.length === 0) {
          grid.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <div class="icon">🔖</div>
              <p>No saved projects yet. Browse projects and click Save to bookmark them.</p>
              <a href="index.html" class="btn btn-outline" style="margin-top:1rem">Browse projects</a>
            </div>`;
          return;
        }

        grid.innerHTML = bookmarks.map(p => `
          <div class="project-card" onclick="window.location.href='project.html?id=${p.id}'">
            <div class="meta">
              <span>${p.department || 'General'}</span>
              <span>${p.year || ''}</span>
              <span>Saved ${timeAgo(p.bookmarked_at)}</span>
            </div>
            <h3>${p.title}</h3>
            <p class="abstract">${p.abstract || ''}</p>
            <div class="tags" style="margin-top:0.75rem">${renderTags(p.tags)}</div>
            <p style="font-size:0.8rem;color:var(--text3);margin-top:0.5rem">by ${p.author_name || 'Unknown'}</p>
          </div>
        `).join('');
      } catch (err) {
        grid.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    loadBookmarks();
  </script>
</body>
</html>
