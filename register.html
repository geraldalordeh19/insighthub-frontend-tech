<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — InsightHub</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { display: flex; flex-direction: column; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
    }
    .auth-card h2 { font-size: 1.8rem; margin-bottom: 0.4rem; }
    .auth-card p  { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; }
    .auth-footer  { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--text2); }
    .auth-footer a { color: var(--accent); }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Create account</h2>
      <p>Join InsightHub — Academic City University's research repository</p>

      <div id="error-msg" class="alert alert-error hidden"></div>
      <div id="success-msg" class="alert alert-success hidden"></div>

      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="name" placeholder="e.g. Kwame Mensah" autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" />
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" id="confirm-password" placeholder="Repeat password" />
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center" id="reg-btn" onclick="doRegister()">
        Create account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/api.js"></script>
  <script>
    renderNav('');
    if (isLoggedIn()) window.location.href = 'index.html';

    async function doRegister() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm-password').value;
      const errEl    = document.getElementById('error-msg');
      const sucEl    = document.getElementById('success-msg');
      const btn      = document.getElementById('reg-btn');

      errEl.classList.add('hidden');
      sucEl.classList.add('hidden');

      if (!name || !email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        return errEl.classList.remove('hidden');
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        return errEl.classList.remove('hidden');
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        return errEl.classList.remove('hidden');
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name, email, password })
        });

        setAuth(data.token, data.user);
        showToast('Account created! Welcome to InsightHub.', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
